apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: support-tickets
  namespace: support-tickets
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/group.name: sre-lab
spec:
  ingressClassName: alb
  rules:
    - host: support-tickets.lab.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: support-tickets-frontend
                port:
                  number: 80
