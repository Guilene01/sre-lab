apiVersion: v1
kind: Namespace
metadata:
  name: food-delivery
  labels:
    app.kubernetes.io/part-of: sre-lab
    env: lab
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: food-delivery-quota
  namespace: food-delivery
spec:
  hard:
    requests.cpu: "1"
    requests.memory: 1Gi
    limits.cpu: "2"
    limits.memory: 2Gi
    pods: "20"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: food-delivery-limits
  namespace: food-delivery
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      default:
        cpu: 250m
        memory: 256Mi
      max:
        cpu: "1"
        memory: 1Gi
      min:
        cpu: 50m
        memory: 64Mi
