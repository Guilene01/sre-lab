apiVersion: apps/v1
kind: Deployment
metadata:
  name: support-tickets-frontend
  namespace: support-tickets
  labels:
    app: support-tickets-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: support-tickets-frontend
  template:
    metadata:
      labels:
        app: support-tickets-frontend
        tags.datadoghq.com/env: "lab"
        tags.datadoghq.com/service: "support-tickets-frontend"
        tags.datadoghq.com/version: "1.0.0"
      annotations:
        ad.datadoghq.com/support-tickets-frontend.logs: '[{"source":"nginx","service":"support-tickets-frontend"}]'
    spec:
      containers:
        - name: support-tickets-frontend
          image: ${ECR_REGISTRY}/sre-lab/support-tickets-frontend:${IMAGE_TAG}
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
