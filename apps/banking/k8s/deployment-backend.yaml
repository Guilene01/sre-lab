apiVersion: apps/v1
kind: Deployment
metadata:
  name: banking-backend
  namespace: banking
  labels:
    app: banking-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: banking-backend
  template:
    metadata:
      labels:
        app: banking-backend
        tags.datadoghq.com/env: "lab"
        tags.datadoghq.com/service: "banking-backend"
        tags.datadoghq.com/version: "1.0.0"
      annotations:
        ad.datadoghq.com/banking-backend.logs: '[{"source":"nodejs","service":"banking-backend"}]'
    spec:
      containers:
        - name: banking-backend
          image: ${ECR_REGISTRY}/sre-lab/banking-backend:${IMAGE_TAG}
          ports:
            - containerPort: 4000
          envFrom:
            - configMapRef:
                name: banking-backend-config
            - secretRef:
                name: banking-db-credentials
          env:
            - name: DD_AGENT_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /readyz
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 15
