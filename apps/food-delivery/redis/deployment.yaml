apiVersion: apps/v1
kind: Deployment
metadata:
  name: food-delivery-redis
  namespace: food-delivery
  labels:
    app: food-delivery-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: food-delivery-redis
  template:
    metadata:
      labels:
        app: food-delivery-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 3
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: food-delivery-redis
  namespace: food-delivery
spec:
  selector:
    app: food-delivery-redis
  ports:
    - port: 6379
      targetPort: 6379
